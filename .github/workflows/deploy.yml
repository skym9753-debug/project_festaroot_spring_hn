name: Java CI/CD with Maven

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. 안전하게 설정 파일 및 JSON 키 파일 생성
      - name: Create secret files
        shell: bash
        run: |
          cat <<EOF > src/main/resources/application-secret.properties
          ${{ secrets.APPLICATION_SECRET }}
          EOF
          
          cat <<EOF > src/main/resources/GCP-festaroute.json
          ${{ secrets.GCP_JSON_KEY }}
          EOF

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deliver JAR via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "target/*.jar"
          target: "~/app"
          strip_components: 1
  
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            # 기존 프로세스 종료
            CURRENT_PID=$(pgrep -f 'java -jar' | grep -v "$$" || true)
            if [ -n "$CURRENT_PID" ]; then
              echo "기존 프로세스 종료 중 (PID: $CURRENT_PID)..."
              sudo kill -15 $CURRENT_PID
              sleep 5
            fi
            
            # 새 JAR 파일 실행
            JAR_NAME=$(ls -tr *.jar 2>/dev/null | grep -v 'original' | grep -v 'plain' | tail -n 1)
            if [ -z "$JAR_NAME" ]; then
              echo "실행할 JAR 파일을 찾을 수 없습니다."
              exit 1
            fi
            
            echo "애플리케이션 실행: $JAR_NAME"
            sudo bash -c "nohup java -jar $JAR_NAME > nohup.out 2>&1 < /dev/null &"
            echo "배포 완료."