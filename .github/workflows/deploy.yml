name: Java CI/CD with Maven

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. 설정 파일 및 JSON 키 파일 생성
      - name: Create secret files
        run: |
          echo "${{ secrets.APPLICATION_SECRET }}" > src/main/resources/application-secret.properties
          echo "${{ secrets.GCP_JSON_KEY }}" > src/main/resources/GCP-festaroute.json

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deliver JAR via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "target/*.jar"
          target: "~/app"
          strip_components: 1
  
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            # (이전과 동일한 프로세스 종료 및 실행 로직)
            CURRENT_PID=$(pgrep -f 'java -jar' | grep -v "$$" || true)
            if [ -n "$CURRENT_PID" ]; then sudo kill -15 $CURRENT_PID; sleep 3; fi
            
            JAR_NAME=$(ls -tr *.jar 2>/dev/null | grep -v 'original' | grep -v 'plain' | tail -n 1)
            sudo bash -c "nohup java -jar $JAR_NAME > nohup.out 2>&1 < /dev/null &"