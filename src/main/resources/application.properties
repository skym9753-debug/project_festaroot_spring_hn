spring.application.name=project

server.port=8080

spring.config.import=application-secret.properties

spring.datasource.url = ${db.url}
spring.datasource.username= ${db.username}
spring.datasource.password= ${db.password}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
mybatis.mapper-locations=classpath:mappers/*-mapper.xml

jwt.expiration=86400000

# Qdrant 설정
spring.ai.vectorstore.qdrant.host=${qdrant.host}
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=festivals

# Gemini 직접 호출용 URL (사용자 지정 모델 적용)
spring.ai.google.genai.api-key=${gemini.key}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent
gemini.embedding.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent


tour.api.key=${tour.api.key}

# Kakao login
kakao.redirect-uri=http://localhost:5173/oauth/kakao/callback
kakao.client-id=${kakao.login.key}

# Naver login
naver.client-id=yETmkSz4Gvo28ywTnOL5
naver.redirect-uri=http://localhost:5173/oauth/naver/callback
naver.client-secret=${naver.login.key}

# Google login
google.client-id=231865398372-grcg253bpnjr5mrm7piucfi9och9115o.apps.googleusercontent.com
google.redirect-uri=http://localhost:5173/oauth/google/callback
google.client-secret=${google.login.key}

# null 값의 기본 JDBC 타입을 VARCHAR로
mybatis.configuration.jdbc-type-for-null=VARCHAR

# GCP
gcp.bucket-name=festaroute-storage

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# 이메일 인증
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=festaroute@gmail.com
spring.mail.password=${google.app.key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2 


# 기상청 API
weather.service-key=${weather.api.key}

